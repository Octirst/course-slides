name: 🚀 Deploy to Aliyun

on:
  push:
    branches:
      - main  # 只监听 main 分支

  # 允许手动触发部署
  workflow_dispatch:

# 取消正在运行的部署，优先执行最新的
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取所有历史记录

      # 2. 安装 pnpm
      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8
          run_install: false

      # 3. 设置 Node.js 环境（必须在 pnpm 之后）
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # 4. 安装依赖
      - name: 📦 Install dependencies
        run: pnpm install

      # 5. 创建生产环境配置文件（构建前需要）
      - name: 🔧 Create .env.production
        run: |
          cat > .env.production << EOF
          AUTH_SECRET=${{ secrets.AUTH_SECRET }}
          AUTH_TRUST_HOST=true
          STUDENT_PASSWORD=${{ secrets.STUDENT_PASSWORD }}
          NODE_ENV=production
          PORT=3000
          EOF
          echo "✅ Created .env.production"

      # 6. 修复 signOut 跳转问题（在构建前修改源码）
      - name: 🩹 Fix signOut redirect
        run: |
          sed -i 's/await signOut();/await signOut({ redirectTo: "\/login" });/g' src/app/page.tsx
          echo "✅ Fixed signOut redirect"

      # 7. 运行构建
      - name: 🔨 Build Next.js
        run: pnpm build

      - name: 📊 Build Slidev slides
        run: |
          chmod +x scripts/build-slides.sh
          ./scripts/build-slides.sh

      # 8. 配置 SSH 密钥
      - name: 🔑 Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ALIYUN_SSH_PRIVATE_KEY }}

      # 9. 测试 SSH 连接
      - name: 🧪 Test SSH connection
        run: |
          echo "Testing SSH connection to ${{ secrets.ALIYUN_SERVER_HOST }}..."
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            ${{ secrets.ALIYUN_SERVER_USER }}@${{ secrets.ALIYUN_SERVER_HOST }} \
            "echo 'SSH connection successful!' && whoami && pwd"

      # 10. 增量上传部署文件（使用 rsync）
      - name: 📤 Upload to Aliyun server (incremental)
        timeout-minutes: 10
        run: |
          echo "📦 准备上传..."

          # 确保服务器目录存在
          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.ALIYUN_SERVER_USER }}@${{ secrets.ALIYUN_SERVER_HOST }} \
            "mkdir -p /var/www/course-slides"

          # 使用 rsync 增量上传 .next 目录（Next.js 构建输出）
          echo "📤 同步 .next 目录..."
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            .next/ \
            ${{ secrets.ALIYUN_SERVER_USER }}@${{ secrets.ALIYUN_SERVER_HOST }}:/var/www/course-slides/.next/

          # 使用 rsync 增量上传 public 目录（slides 等静态资源）
          echo "📤 同步 public 目录..."
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            public/ \
            ${{ secrets.ALIYUN_SERVER_USER }}@${{ secrets.ALIYUN_SERVER_HOST }}:/var/www/course-slides/public/

          # 上传配置文件（这些文件较小，直接覆盖）
          echo "📤 同步配置文件..."
          scp -o StrictHostKeyChecking=no \
            package.json ecosystem.config.js .env.production \
            ${{ secrets.ALIYUN_SERVER_USER }}@${{ secrets.ALIYUN_SERVER_HOST }}:/var/www/course-slides/

          echo "✅ 上传完成"

      # 11. 在服务器上执行部署
      - name: 🚀 Deploy on Aliyun server
        timeout-minutes: 10
        run: |
          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.ALIYUN_SERVER_USER }}@${{ secrets.ALIYUN_SERVER_HOST }} << ENDSSH
            #!/bin/bash
            set -e

            DEPLOY_PATH="/var/www/course-slides"

            echo "📂 进入部署目录..."
            cd \$DEPLOY_PATH

            echo "🛑 停止当前应用..."
            pm2 stop course-slides || true

            echo "📦 安装依赖（如果 package.json 有变化）..."
            if [ ! -d "node_modules" ] || [ "package.json" -nt "node_modules/.package.json" ]; then
              echo "检测到依赖变化，执行 npm install..."
              npm config set registry https://registry.npmmirror.com
              npm install
            else
              echo "依赖未变化，跳过安装"
            fi

            echo "🚀 启动应用..."
            pm2 restart course-slides || pm2 start ecosystem.config.js

            echo "⏳ 等待应用启动..."
            sleep 3

            echo "✅ 检查应用状态..."
            pm2 status course-slides

            echo "📋 查看最新日志..."
            pm2 logs course-slides --lines 5 --nostream
          ENDSSH

      # 12. 部署成功通知
      - name: ✅ Deployment complete
        run: |
          echo "========================================"
          echo "✅ 部署成功！"
          echo "========================================"
          echo "📝 访问地址：http://${{ secrets.ALIYUN_SERVER_HOST }}"
          echo "🔗 Commit: ${{ github.sha }}"
          echo "👤 Author: ${{ github.actor }}"
