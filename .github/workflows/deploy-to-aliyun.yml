name: 🚀 Deploy to Aliyun

on:
  push:
    branches:
      - main  # 只监听 main 分支

  # 允许手动触发部署
  workflow_dispatch:

# 取消正在运行的部署，优先执行最新的
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取所有历史记录

      # 2. 安装 pnpm
      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8
          run_install: false

      # 3. 设置 Node.js 环境（必须在 pnpm 之后）
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # 4. 安装依赖
      - name: 📦 Install dependencies
        run: pnpm install

      # 5. 创建生产环境配置文件（构建前需要）
      - name: 🔧 Create .env.production
        run: |
          cat > .env.production << EOF
          AUTH_SECRET=${{ secrets.AUTH_SECRET }}
          AUTH_TRUST_HOST=true
          STUDENT_PASSWORD=${{ secrets.STUDENT_PASSWORD }}
          NODE_ENV=production
          PORT=3000
          EOF
          echo "✅ Created .env.production"

      # 6. 修复 signOut 跳转问题（在构建前修改源码）
      - name: 🩹 Fix signOut redirect
        run: |
          sed -i 's/await signOut();/await signOut({ redirectTo: "\/login" });/g' src/app/page.tsx
          echo "✅ Fixed signOut redirect"

      # 7. 运行构建
      - name: 🔨 Build Next.js
        run: pnpm build

      - name: 📊 Build Slidev slides
        run: |
          chmod +x scripts/build-slides.sh
          ./scripts/build-slides.sh

      # 8. 配置 SSH 密钥
      - name: 🔑 Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ALIYUN_SSH_PRIVATE_KEY }}

      # 9. 测试 SSH 连接
      - name: 🧪 Test SSH connection
        run: |
          echo "Testing SSH connection to ${{ secrets.ALIYUN_SERVER_HOST }}..."
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            ${{ secrets.ALIYUN_SERVER_USER }}@${{ secrets.ALIYUN_SERVER_HOST }} \
            "echo 'SSH connection successful!' && whoami && pwd"

      # 10. 上传部署文件（跳过 known_hosts 检查）
      - name: 📤 Upload to Aliyun server
        timeout-minutes: 5
        run: |
          DEPLOY_PACKAGE="deploy-${{ github.sha }}.tar.gz"

          echo "📦 创建部署包（不包含 node_modules）..."
          tar -czf $DEPLOY_PACKAGE \
            .next \
            public \
            package.json \
            pnpm-lock.yaml \
            ecosystem.config.js \
            .env.production

          echo "📊 包大小："
          ls -lh $DEPLOY_PACKAGE

          echo "☁️ 上传到服务器..."
          scp -o StrictHostKeyChecking=no \
            $DEPLOY_PACKAGE \
            ${{ secrets.ALIYUN_SERVER_USER }}@${{ secrets.ALIYUN_SERVER_HOST }}:~/

          echo "✅ 上传完成"
          rm -f $DEPLOY_PACKAGE

      # 11. 在服务器上执行部署
      - name: 🚀 Deploy on Aliyun server
        timeout-minutes: 10
        run: |
          DEPLOY_PACKAGE="deploy-${{ github.sha }}.tar.gz"

          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.ALIYUN_SERVER_USER }}@${{ secrets.ALIYUN_SERVER_HOST }} << ENDSSH
            #!/bin/bash
            set -e

            DEPLOY_PATH="/var/www/course-slides"
            DEPLOY_PACKAGE="$DEPLOY_PACKAGE"

            echo "📂 进入部署目录..."
            cd \$DEPLOY_PATH

            echo "🛑 停止当前应用..."
            pm2 stop course-slides || true

            echo "🗑️  清理旧版本..."
            rm -rf .next public node_modules

            echo "📦 解压新版本..."
            tar -xzf ~/\$DEPLOY_PACKAGE

            echo "📦 安装依赖..."
            pnpm install --frozen-lockfile

            echo "🧹 清理部署包..."
            rm -f ~/\$DEPLOY_PACKAGE

            echo "🚀 启动应用..."
            pm2 restart course-slides || pm2 start ecosystem.config.js

            echo "⏳ 等待应用启动..."
            sleep 3

            echo "✅ 检查应用状态..."
            pm2 status course-slides

            echo "📋 查看最新日志..."
            pm2 logs course-slides --lines 5 --nostream
          ENDSSH

      # 12. 部署成功通知
      - name: ✅ Deployment complete
        run: |
          echo "========================================"
          echo "✅ 部署成功！"
          echo "========================================"
          echo "📝 访问地址：http://${{ secrets.ALIYUN_SERVER_HOST }}"
          echo "🔗 Commit: ${{ github.sha }}"
          echo "👤 Author: ${{ github.actor }}"
